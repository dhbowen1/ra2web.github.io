; WERHD sound overlay for the Guardian GI audio bag only.
; This file is merged after the base sound.ini and must not override original unit sounds.

[SoundList]
0=GuardianGIAttack
1=GuardianGIDeploy
2=GuardianGIDie
3=GuardianGIFear
4=GuardianGIMove
5=GuardianGISelect
6=GuardianGiDeployedAttack
7=GuardianGiUnDeploy

[GuardianGIAttack]
Sounds=$iggiata $iggiatb $iggiatc $iggiatd $iggiate
Control=random
Volume=85

[GuardianGIDeploy]
Sounds=iggidepa
Control=interrupt
FShift=-5 5
Volume=60
Limit=3

[GuardianGIDie]
Sounds=$iggidia $iggidib $iggidic $iggidid $iggidie
Control=random
Volume=85

[GuardianGIFear]
Sounds=$iggifea $iggifeb $iggifec $iggifed $iggifee $iggifef
Control=random
Priority=low
Volume=85

[GuardianGIMove]
Sounds=$iggimoa $iggimob $iggimoc $iggimod $iggimoe
Control=random
Volume=85

[GuardianGISelect]
Sounds=$iggisea $iggiseb $iggisec $iggised $iggisee $iggisef
Control=random
Limit=5
Volume=85

[GuardianGiDeployedAttack]
Sounds=iggiat2a iggiat2b
Control=interrupt
FShift=-5 5
VShift=10
Limit=3

[GuardianGiUnDeploy]
Sounds=iggidepa
Control=interrupt
FShift=-5 5
Volume=40
Priority=low
Limit=3

